<!DOCTYPE html>
<html>
<head>
  <title>Gemini AI Website</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2>Gemini AI Web App</h2>

  <textarea id="input" placeholder="Ask something..."></textarea>
  <br>
  <button onclick="run()">Send</button>

  <div id="output">Result will appear here</div>

  <script>
    const API_KEY = "YOUR_API_KEY_HERE"; // ⚠️ replace this

    async function run() {
      const prompt = document.getElementById("input").value;
      const output = document.getElementById("output");

      output.innerText = "Thinking...";

      try {
        const res = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [{ text: prompt }]
                }
              ]
            })
          }
        );

        const data = await res.json();

        const text = data.candidates[0].content.parts[0].text;

        output.innerText = text;

      } catch (err) {
        output.innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
